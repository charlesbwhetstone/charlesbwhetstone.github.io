# Site Settings
title: "Charles Whetstone"
description: "Data Scientist & Forensics Engineer Portfolio"
url: "https://charlesbwhetstone.github.io"
baseurl: ""

# Theme
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "dark"

# Site Author
author:
  name: "Charles Whetstone"
  bio: "Data Scientist & Forensics Engineer"
  location: "Northwest Arkansas"
  avatar: "/assets/images/bio-photo.jpg" # Optional: add your photo here
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/charlesbwhetstone"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/charlesbwhetstone/"
    - label: "Medium"
      icon: "fab fa-fw fa-medium"
      url: "https://groundcontrolcharles.medium.com"

# Collections
collections:
  projects:
    output: true
    permalink: /:collection/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: projects
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-include-cache

# Build settings
markdown: kramdown
highlighter: rouge

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
